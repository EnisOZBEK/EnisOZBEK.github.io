<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Enis Özbek | Interactive Portfolio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d12;
      touch-action: none;
      overscroll-behavior: none;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loader {
      width: 120px;
      height: 4px;
      background: rgba(0, 229, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 30px;
    }
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00E5FF, #D31A38);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 20px #00E5FF;
    }
    .loading-text {
      font-family: 'Orbitron', sans-serif;
      color: #00E5FF;
      font-size: 14px;
      letter-spacing: 4px;
      margin-top: 20px;
      text-transform: uppercase;
    }
    .loading-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #00E5FF 0%, #D31A38 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 8px;
    }
    .scroll-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Rajdhani', sans-serif;
      color: rgba(0, 229, 255, 0.6);
      font-size: 14px;
      letter-spacing: 2px;
      animation: pulse 2s ease-in-out infinite;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .scroll-hint.hidden {
      opacity: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-5px); }
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #00E5FF, #D31A38);
      z-index: 1000;
      transition: width 0.1s ease;
      box-shadow: 0 0 10px #00E5FF, 0 0 20px rgba(0, 229, 255, 0.5);
    }
    .milestone-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      font-family: 'Orbitron', sans-serif;
      color: #00E5FF;
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 100;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
    }
  </style>
</head>
<body class="h-full">
  <div class="loading-screen" id="loadingScreen">
   <div class="loading-logo">PORTFOLIO</div>
   <div class="loader">
    <div class="loader-bar" id="loaderBar"></div>
   </div>
   <div class="loading-text" id="loadingText">INITIALIZING</div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="progress-bar" id="progressBar"></div>
  <div class="milestone-indicator" id="milestoneIndicator">MILE 0</div>
  <div class="scroll-hint" id="scrollHint">↓ SCROLL OR SWIPE TO DRIVE ↓</div>
  <script>
    const CONFIG = {
      colors: {
        void: '#0d0d12',
        neonBlue: '#00E5FF',
        neonRed: '#D31A38',
        neonPurple: '#8B5CF6',
        neonPink: '#EC4899',
        white: '#FFFFFF',
        darkGray: '#1a1a24',
        midGray: '#2d2d3d'
      },
      world: {
        totalLength: 12000,
        groundY: 0.75,
        roadHeight: 120
      },
      car: {
        width: 180,
        height: 70,
        wheelRadius: 22
      },
      physics: {
        lerpSpeed: 0.08,
        scrollMultiplier: 1.8,
        maxSpeed: 50
      }
    };

    const config = {
      owner_name: 'ENIS ÖZBEK',
      owner_title: 'Game Developer | Gameplay & Systems Designer',
      contact_phone: '+90 501 030 11 30',
      contact_email: 'Enisozbek1@gmail.com'
    };

    function getMilestones() {
      return [
        {
          x: 400,
          title: config.owner_name,
          subtitle: config.owner_title,
          text: 'Scroll down or swipe to drive.',
          icon: '🎮'
        },
        {
          x: 2800,
          title: 'EXPERIENCE',
          subtitle: 'Lead Game Developer @ Cim Games',
          text: 'Led development of Brunswick (3D open-world). Authored 20k+ lines of C#. Boosted FPS by 70%.',
          icon: '💼'
        },
        {
          x: 5200,
          title: 'SKILLS',
          subtitle: 'Technical Arsenal',
          text: 'Unity (URP, 2D/3D), C#, System Design, NavMesh AI.',
          icon: '⚡'
        },
        {
          x: 7600,
          title: 'PROJECTS',
          subtitle: 'Solo Development',
          text: 'Shatter Strike (3D runner with destruction), Valorium: Vengeance (2D Hack & Slash).',
          icon: '🚀'
        },
        {
          x: 10000,
          title: 'CONTACT',
          subtitle: "Let's build something.",
          text: `Phone: ${config.contact_phone} | Email: ${config.contact_email} | GitHub: EnisOZBEK`,
          icon: '📧'
        }
      ];
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dpr = window.devicePixelRatio || 1;
    let width, height;

    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      
      ctx.scale(dpr, dpr);
    }

    function lerp(start, end, factor) { return start + (end - start) * factor; }
    function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }
    function randomRange(min, max) { return Math.random() * (max - min) + min; }

    const state = {
      scrollTarget: 0,
      scrollCurrent: 0,
      scrollVelocity: 0,
      wheelRotation: 0,
      time: 0,
      loaded: false,
      currentMilestone: 0,
      touchStartY: 0,
      lastTouchY: 0,
      isDragging: false
    };

    class Particle {
      constructor(x, y, vx, vy, color, size, life) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.size = size; this.life = life;
        this.maxLife = life; this.alpha = 1;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.vy += 0.1;
        this.life--; this.alpha = this.life / this.maxLife; this.size *= 0.98;
      }
      draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.8;
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    const particles = [];
    function emitExhaustParticles(x, y, speed) {
      const particleCount = Math.floor(Math.abs(speed) * 0.3) + 1;
      for (let i = 0; i < particleCount; i++) {
        const color = Math.random() > 0.5 ? CONFIG.colors.neonBlue : CONFIG.colors.white;
        particles.push(new Particle(
          x + randomRange(-5, 5), y + randomRange(-3, 3),
          -Math.abs(speed) * 0.3 + randomRange(-2, -0.5), randomRange(-1, 1),
          color, randomRange(2, 5), randomRange(20, 40)
        ));
      }
    }

    const stars = [];
    function initStars() {
      for (let i = 0; i < 200; i++) {
        const isSlowFader = Math.random() < 0.2;
        stars.push({
          x: Math.random() * CONFIG.world.totalLength * 1.5,
          y: Math.random() * 0.5,
          size: Math.random() * 2 + 0.5,
          twinkleSpeed: isSlowFader ? 0.002 : Math.random() * 0.07 + 0.03,
          twinkleOffset: Math.random() * Math.PI * 2,
          isSlowFader: isSlowFader
        });
      }
    }

    function drawStars(cameraX) {
      const parallaxFactor = 0.05;
      stars.forEach(star => {
        const screenX = star.x - cameraX * parallaxFactor;
        const wrappedX = ((screenX % (width * 2)) + width * 2) % (width * 2) - width * 0.5;
        const screenY = star.y * height;
        const twinkle = Math.sin(state.time * star.twinkleSpeed + star.twinkleOffset) * 0.5 + 0.5;
        const alpha = 0.3 + twinkle * 0.7;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = CONFIG.colors.white;
        ctx.shadowColor = CONFIG.colors.neonBlue;
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.arc(wrappedX, screenY, star.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    const buildings = [];
    function initBuildings() {
      let x = 0;
      while (x < CONFIG.world.totalLength * 1.2) {
        const buildingWidth = randomRange(40, 120);
        const buildingHeight = randomRange(80, 250);
        buildings.push({
          x: x, width: buildingWidth, height: buildingHeight,
          windows: Math.floor(randomRange(5, 10)),
          windowRows: Math.floor(buildingHeight / 25),
          glowColor: Math.random() > 0.5 ? CONFIG.colors.neonBlue : CONFIG.colors.neonPurple,
          hasAntenna: buildingHeight > 180
        });
        x += buildingWidth + randomRange(20, 60);
      }
    }

    function drawCitySilhouettes(cameraX) {
      const parallaxFactor = 0.15;
      const baseY = height * CONFIG.world.groundY;
      buildings.forEach((building, buildingIndex) => {
        const screenX = building.x - cameraX * parallaxFactor;
        if (screenX < -200 || screenX > width + 200) return;
        const y = baseY;
        ctx.save();
        const gradient = ctx.createLinearGradient(screenX, y - building.height, screenX, y);
        gradient.addColorStop(0, 'rgba(20, 20, 35, 0.9)');
        gradient.addColorStop(1, 'rgba(13, 13, 18, 0.95)');
        ctx.fillStyle = gradient;
        ctx.fillRect(screenX, y - building.height, building.width, building.height);
        
        ctx.strokeStyle = building.glowColor;
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = 1;
        ctx.shadowColor = building.glowColor;
        ctx.shadowBlur = 10;
        ctx.strokeRect(screenX, y - building.height, building.width, building.height);
        
        ctx.globalAlpha = 0.7;
        const windowWidth = (building.width - 20) / building.windows;
        for (let row = 0; row < building.windowRows; row++) {
          for (let col = 0; col < building.windows; col++) {
            const windowSeed = buildingIndex * 1000 + row * 100 + col;
            const pseudoRandom = Math.sin(windowSeed * 12.9898) * 43758.5453;
            const windowOn = (pseudoRandom - Math.floor(pseudoRandom)) > 0.3;
            if (windowOn) {
              const wx = screenX + 10 + col * windowWidth;
              const wy = y - building.height + 15 + row * 25;
              const isBlue = (pseudoRandom - Math.floor(pseudoRandom)) > 0.5;
              const windowColor = isBlue ? CONFIG.colors.neonBlue : 'rgba(255, 200, 100, 0.9)';
              ctx.fillStyle = windowColor;
              ctx.shadowColor = windowColor;
              ctx.shadowBlur = 8;
              ctx.fillRect(wx, wy, windowWidth - 8, 12);
            }
          }
        }
        
        if (building.hasAntenna) {
          ctx.shadowBlur = 10;
          ctx.strokeStyle = CONFIG.colors.neonRed;
          ctx.globalAlpha = 0.8;
          ctx.lineWidth = 2;
          ctx.shadowColor = CONFIG.colors.neonRed;
          ctx.beginPath();
          ctx.moveTo(screenX + building.width / 2, y - building.height);
          ctx.lineTo(screenX + building.width / 2, y - building.height - 30);
          ctx.stroke();
          
          const blink = Math.sin(state.time * 3) > 0;
          if (blink) {
            ctx.fillStyle = CONFIG.colors.neonRed;
            ctx.globalAlpha = 1;
            ctx.shadowColor = CONFIG.colors.neonRed;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(screenX + building.width / 2, y - building.height - 30, 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      });
    }

    const mountains = [];
    function initMountains() {
      let x = 0;
      while (x < CONFIG.world.totalLength * 1.3) {
        const seed = Math.floor(x / 150);
        const pseudoRandom1 = Math.sin(seed * 12.9898) * 43758.5453;
        const pseudoRandom2 = Math.sin(seed * 78.233) * 43758.5453;
        const pseudoRandom3 = Math.sin(seed * 45.164) * 43758.5453;
        const frac1 = pseudoRandom1 - Math.floor(pseudoRandom1);
        const frac2 = pseudoRandom2 - Math.floor(pseudoRandom2);
        const frac3 = pseudoRandom3 - Math.floor(pseudoRandom3);
        const width = 200 + (frac1 * 200);
        const height = 100 + (frac2 * 100);
        const peaks = 2 + Math.floor(frac3 * 2);
        const peakPositions = [];
        const peakWidth = width / peaks;
        for (let i = 0; i < peaks; i++) {
          const peakSeed = seed * 1000 + i * 100;
          const peakRandom = Math.sin(peakSeed * 23.456) * 43758.5453;
          const peakHeight = 0.7 + ((peakRandom - Math.floor(peakRandom)) * 0.3);
          peakPositions.push(peakHeight);
        }
        mountains.push({ x: x, width: width, height: height, peaks: peaks, peakPositions: peakPositions });
        x += 150 + (frac1 * 150);
      }
    }

    function drawMountains(cameraX) {
      const parallaxFactor = 0.12;
      const baseY = height * CONFIG.world.groundY;
      ctx.save();
      mountains.forEach(mountain => {
        const screenX = mountain.x - cameraX * parallaxFactor;
        if (screenX < -mountain.width || screenX > width + mountain.width) return;
        const gradient = ctx.createLinearGradient(screenX, baseY - mountain.height, screenX, baseY);
        gradient.addColorStop(0, 'rgba(30, 30, 50, 0.8)');
        gradient.addColorStop(1, 'rgba(13, 13, 18, 0.9)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(screenX, baseY);
        const peakWidth = mountain.width / mountain.peaks;
        for (let i = 0; i < mountain.peaks; i++) {
          const peakX = screenX + (i + 0.5) * peakWidth;
          const peakY = baseY - mountain.height * mountain.peakPositions[i];
          ctx.lineTo(peakX, peakY);
        }
        ctx.lineTo(screenX + mountain.width, baseY);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = CONFIG.colors.neonPurple;
        ctx.globalAlpha = 0.15;
        ctx.lineWidth = 2;
        ctx.shadowColor = CONFIG.colors.neonPurple;
        ctx.shadowBlur = 15;
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawPedestrianWalkway(cameraX) {
      const roadY = height * CONFIG.world.groundY;
      const walkwayHeight = 40;
      const walkwayTopY = roadY - walkwayHeight;
      const walkwayBottomY = roadY + CONFIG.world.roadHeight;
      ctx.save();
      const walkwayGradient1 = ctx.createLinearGradient(0, walkwayTopY, 0, roadY);
      walkwayGradient1.addColorStop(0, '#2a2a3a');
      walkwayGradient1.addColorStop(1, '#1a1a2a');
      ctx.fillStyle = walkwayGradient1;
      ctx.fillRect(0, walkwayTopY, width, walkwayHeight);
      
      ctx.strokeStyle = CONFIG.colors.neonPurple;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.3;
      ctx.shadowColor = CONFIG.colors.neonPurple;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(0, roadY);
      ctx.lineTo(width, roadY);
      ctx.stroke();
      
      const walkwayGradient2 = ctx.createLinearGradient(0, walkwayBottomY, 0, walkwayBottomY + walkwayHeight);
      walkwayGradient2.addColorStop(0, '#2a2a3a');
      walkwayGradient2.addColorStop(1, '#1a1a2a');
      ctx.fillStyle = walkwayGradient2;
      ctx.fillRect(0, walkwayBottomY, width, walkwayHeight);
      
      ctx.beginPath();
      ctx.moveTo(0, walkwayBottomY);
      ctx.lineTo(width, walkwayBottomY);
      ctx.stroke();
      
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = 'rgba(100, 100, 120, 0.5)';
      ctx.lineWidth = 1;
      const tileSize = 60;
      const tileOffset = cameraX % tileSize;
      
      for (let x = -tileOffset; x < width; x += tileSize) {
        ctx.beginPath(); ctx.moveTo(x, walkwayTopY); ctx.lineTo(x, roadY); ctx.stroke();
      }
      for (let x = -tileOffset; x < width; x += tileSize) {
        ctx.beginPath(); ctx.moveTo(x, walkwayBottomY); ctx.lineTo(x, walkwayBottomY + walkwayHeight); ctx.stroke();
      }
      ctx.restore();
    }

    function drawRoad(cameraX) {
      const roadY = height * CONFIG.world.groundY;
      const roadHeight = CONFIG.world.roadHeight;
      ctx.save();
      const roadGradient = ctx.createLinearGradient(0, roadY, 0, roadY + roadHeight);
      roadGradient.addColorStop(0, '#1a1a24');
      roadGradient.addColorStop(0.5, '#252535');
      roadGradient.addColorStop(1, '#1a1a24');
      ctx.fillStyle = roadGradient;
      ctx.fillRect(0, roadY, width, roadHeight);
      
      ctx.strokeStyle = CONFIG.colors.neonBlue;
      ctx.lineWidth = 3;
      ctx.shadowColor = CONFIG.colors.neonBlue;
      ctx.shadowBlur = 15;
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(0, roadY); ctx.lineTo(width, roadY); ctx.stroke();
      
      ctx.strokeStyle = CONFIG.colors.neonRed;
      ctx.shadowColor = CONFIG.colors.neonRed;
      ctx.beginPath(); ctx.moveTo(0, roadY + roadHeight); ctx.lineTo(width, roadY + roadHeight); ctx.stroke();
      
      ctx.globalAlpha = 0.8;
      ctx.strokeStyle = CONFIG.colors.white;
      ctx.shadowColor = CONFIG.colors.white;
      ctx.shadowBlur = 5;
      ctx.lineWidth = 4;
      ctx.setLineDash([40, 30]);
      ctx.lineDashOffset = cameraX * 0.5;
      ctx.beginPath(); ctx.moveTo(0, roadY + roadHeight / 2); ctx.lineTo(width, roadY + roadHeight / 2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawCar(x, y, wheelRotation, speed) {
      ctx.save();
      ctx.translate(x, y);
      const carWidth = CONFIG.car.width;
      const carHeight = CONFIG.car.height;
      const bounce = Math.sin(state.time * 15) * Math.min(Math.abs(speed) * 0.1, 2);
      ctx.translate(0, bounce);
      drawDetailedCar(carWidth, carHeight, wheelRotation, speed);
      ctx.restore();
    }

    function drawDetailedCar(carWidth, carHeight, wheelRotation, speed) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(0, carHeight * 0.5, carWidth * 0.45, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      
      ctx.save();
      const bodyGradient = ctx.createLinearGradient(-carWidth * 0.5, -carHeight * 0.4, carWidth * 0.5, carHeight * 0.3);
      bodyGradient.addColorStop(0, '#2a4a6a'); bodyGradient.addColorStop(0.3, '#3d6a8a');
      bodyGradient.addColorStop(0.5, '#4a7a9a'); bodyGradient.addColorStop(0.7, '#3d6a8a');
      bodyGradient.addColorStop(1, '#2a4a6a');
      
      ctx.fillStyle = bodyGradient;
      ctx.beginPath();
      ctx.moveTo(-carWidth * 0.48, carHeight * 0.15);
      ctx.lineTo(-carWidth * 0.48, -carHeight * 0.1);
      ctx.lineTo(-carWidth * 0.35, -carHeight * 0.35);
      ctx.lineTo(-carWidth * 0.05, -carHeight * 0.4);
      ctx.lineTo(carWidth * 0.05, -carHeight * 0.4);
      ctx.lineTo(carWidth * 0.35, -carHeight * 0.35);
      ctx.lineTo(carWidth * 0.48, -carHeight * 0.1);
      ctx.lineTo(carWidth * 0.48, carHeight * 0.15);
      ctx.lineTo(carWidth * 0.45, carHeight * 0.25);
      ctx.lineTo(-carWidth * 0.45, carHeight * 0.25);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#1a3a5a';
      ctx.beginPath();
      const frontX = carWidth * 0.45, frontY = -carHeight * 0.1;
      const frontWidth = carWidth * 0.08, frontHeight = carHeight * 0.35, cornerRadius = 6;
      ctx.moveTo(frontX - cornerRadius, frontY);
      ctx.lineTo(frontX - frontWidth + cornerRadius, frontY);
      ctx.quadraticCurveTo(frontX - frontWidth, frontY, frontX - frontWidth, frontY + cornerRadius);
      ctx.lineTo(frontX - frontWidth, frontY + frontHeight - cornerRadius);
      ctx.quadraticCurveTo(frontX - frontWidth, frontY + frontHeight, frontX - frontWidth + cornerRadius, frontY + frontHeight);
      ctx.lineTo(frontX - cornerRadius, frontY + frontHeight);
      ctx.quadraticCurveTo(frontX, frontY + frontHeight, frontX, frontY + frontHeight - cornerRadius);
      ctx.lineTo(frontX, frontY + cornerRadius);
      ctx.quadraticCurveTo(frontX, frontY, frontX - cornerRadius, frontY);
      ctx.closePath(); ctx.fill();
      
      ctx.strokeStyle = CONFIG.colors.neonRed;
      ctx.lineWidth = 3;
      ctx.shadowColor = CONFIG.colors.neonRed;
      ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.moveTo(-carWidth * 0.45, carHeight * 0.1); ctx.lineTo(carWidth * 0.45, carHeight * 0.1); ctx.stroke();
      
      ctx.fillStyle = 'rgba(20, 40, 60, 0.9)';
      ctx.strokeStyle = 'rgba(100, 150, 200, 0.5)';
      ctx.lineWidth = 2; ctx.shadowBlur = 0;
      
      ctx.beginPath();
      ctx.moveTo(-carWidth * 0.35, -carHeight * 0.28); ctx.lineTo(-carWidth * 0.08, -carHeight * 0.38);
      ctx.lineTo(carWidth * 0.08, -carHeight * 0.38); ctx.lineTo(carWidth * 0.35, -carHeight * 0.28);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(carWidth * 0.25, -carHeight * 0.25); ctx.lineTo(carWidth * 0.05, -carHeight * 0.35);
      ctx.lineTo(carWidth * 0.35, -carHeight * 0.18);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.beginPath(); ctx.arc(-carWidth * 0.05, -carHeight * 0.32, carWidth * 0.05, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-carWidth * 0.12, -carHeight * 0.25, carWidth * 0.14, carWidth * 0.05);
      ctx.restore();
      
      ctx.fillStyle = CONFIG.colors.neonBlue;
      ctx.shadowColor = CONFIG.colors.neonBlue;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.moveTo(carWidth * 0.47, -carHeight * 0.02); ctx.lineTo(carWidth * 0.53, carHeight * 0.05);
      ctx.lineTo(carWidth * 0.5, carHeight * 0.12); ctx.lineTo(carWidth * 0.43, carHeight * 0.08);
      ctx.closePath(); ctx.fill();
      
      if (Math.abs(speed) > 0.5) {
        ctx.globalAlpha = 0.15 + Math.abs(speed) * 0.01;
        const beamGradient = ctx.createRadialGradient(carWidth * 0.5, carHeight * 0.05, 0, carWidth * 0.5, carHeight * 0.05, 150);
        beamGradient.addColorStop(0, CONFIG.colors.neonBlue); beamGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = beamGradient;
        ctx.beginPath();
        ctx.moveTo(carWidth * 0.48, -carHeight * 0.1); ctx.lineTo(carWidth * 0.5 + 150, -carHeight * 0.3);
        ctx.lineTo(carWidth * 0.5 + 150, carHeight * 0.4); ctx.lineTo(carWidth * 0.48, carHeight * 0.15);
        ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      }
      
      ctx.fillStyle = CONFIG.colors.neonRed;
      ctx.shadowColor = CONFIG.colors.neonRed;
      ctx.shadowBlur = 15;
      ctx.fillRect(-carWidth * 0.47, -carHeight * 0.02, 8, 20);
      
      ctx.fillStyle = '#1a3a5a'; ctx.shadowBlur = 0;
      ctx.fillRect(-carWidth * 0.38, -carHeight * 0.48, carWidth * 0.15, 4);
      ctx.restore();
      
      drawWheel(-carWidth * 0.32, carHeight * 0.28, wheelRotation, true);
      drawWheel(carWidth * 0.32, carHeight * 0.28, wheelRotation, true);
    }

    function drawWheel(x, y, rotation, isSmall = false) {
      ctx.save(); ctx.translate(x, y);
      const radius = isSmall ? CONFIG.car.wheelRadius * 0.75 : CONFIG.car.wheelRadius;
      ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3; ctx.stroke();
      
      ctx.save(); ctx.rotate(rotation);
      const rimGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.85);
      rimGradient.addColorStop(0, '#4a4a5a'); rimGradient.addColorStop(0.5, '#6a6a7a'); rimGradient.addColorStop(1, '#3a3a4a');
      ctx.fillStyle = rimGradient; ctx.beginPath(); ctx.arc(0, 0, radius * 0.85, 0, Math.PI * 2); ctx.fill();
      
      ctx.fillStyle = '#2a2a3a';
      for (let i = 0; i < 5; i++) {
        ctx.save(); ctx.rotate((i / 5) * Math.PI * 2);
        ctx.beginPath(); ctx.moveTo(-3, -radius * 0.2); ctx.lineTo(3, -radius * 0.2);
        ctx.lineTo(5, -radius * 0.75); ctx.lineTo(-5, -radius * 0.75); ctx.closePath(); ctx.fill(); ctx.restore();
      }
      ctx.fillStyle = '#5a5a6a'; ctx.beginPath(); ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = CONFIG.colors.neonBlue; ctx.font = `bold ${radius * 0.2}px 'Orbitron', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('A', 0, 0);
      ctx.restore(); ctx.restore();
    }

    const drone = { offsetX: -100, offsetY: -120, bobPhase: 0, scanningTarget: null, scanProgress: 0 };
    function drawDrone(carX, carY, nearestMilestone, milestoneScreenX) {
      const droneX = carX + drone.offsetX + Math.sin(state.time * 2) * 10;
      const droneY = carY + drone.offsetY + Math.sin(state.time * 3 + 1) * 8;
      ctx.save(); ctx.translate(droneX, droneY);
      
      ctx.fillStyle = '#2a2a3a'; ctx.strokeStyle = CONFIG.colors.neonBlue;
      ctx.lineWidth = 2; ctx.shadowColor = CONFIG.colors.neonBlue; ctx.shadowBlur = 10;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(angle) * 15, py = Math.sin(angle) * 12;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      
      const eyeGlow = Math.sin(state.time * 5) * 0.3 + 0.7;
      ctx.fillStyle = CONFIG.colors.neonBlue; ctx.globalAlpha = eyeGlow;
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      
      ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)'; ctx.lineWidth = 1;
      [-20, 20].forEach(propX => {
        ctx.save(); ctx.translate(propX, -5); ctx.rotate(state.time * 20);
        ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(12, 0); ctx.stroke(); ctx.restore();
      });
      ctx.restore();
      
      if (nearestMilestone && Math.abs(milestoneScreenX - (carX + drone.offsetX)) < 300) {
        const beamAlpha = Math.sin(state.time * 8) * 0.3 + 0.5;
        ctx.save(); ctx.globalAlpha = beamAlpha; ctx.strokeStyle = CONFIG.colors.neonBlue;
        ctx.lineWidth = 3; ctx.shadowColor = CONFIG.colors.neonBlue; ctx.shadowBlur = 20;
        ctx.setLineDash([5, 5]); ctx.lineDashOffset = -state.time * 50;
        ctx.beginPath(); ctx.moveTo(droneX, droneY); ctx.lineTo(milestoneScreenX, carY - 150); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
      }
    }

    function drawMilestone(milestone, screenX, cameraX) {
      const roadY = height * CONFIG.world.groundY;
      const topWalkwayY = roadY - 40;
      const billboardWidth = 350, billboardHeight = 200;
      const visibility = Math.max(0, 1 - Math.abs(screenX - width * 0.5) / (width * 0.8));
      if (visibility <= 0) return;
      
      ctx.save(); ctx.globalAlpha = visibility; ctx.translate(screenX, topWalkwayY);
      
      ctx.fillStyle = '#1a1a2a'; ctx.strokeStyle = CONFIG.colors.neonBlue;
      ctx.lineWidth = 2; ctx.shadowColor = CONFIG.colors.neonBlue; ctx.shadowBlur = 10;
      ctx.fillRect(-5, -100, 10, 120); ctx.strokeRect(-5, -100, 10, 120);
      
      const frameGradient = ctx.createLinearGradient(-billboardWidth / 2, -billboardHeight - 100, billboardWidth / 2, -100);
      frameGradient.addColorStop(0, 'rgba(13, 13, 18, 0.95)');
      frameGradient.addColorStop(0.5, 'rgba(26, 26, 38, 0.95)');
      frameGradient.addColorStop(1, 'rgba(13, 13, 18, 0.95)');
      ctx.fillStyle = frameGradient; ctx.beginPath();
      ctx.roundRect(-billboardWidth / 2, -billboardHeight - 100, billboardWidth, billboardHeight, 10); ctx.fill();
      
      ctx.strokeStyle = CONFIG.colors.neonBlue; ctx.lineWidth = 3;
      ctx.shadowColor = CONFIG.colors.neonBlue; ctx.shadowBlur = 20; ctx.stroke();
      ctx.strokeStyle = CONFIG.colors.neonRed; ctx.lineWidth = 1;
      ctx.shadowColor = CONFIG.colors.neonRed; ctx.beginPath();
      ctx.roundRect(-billboardWidth / 2 + 8, -billboardHeight - 92, billboardWidth - 16, billboardHeight - 16, 5); ctx.stroke();
      
      ctx.shadowBlur = 0; ctx.font = '32px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(milestone.icon, 0, -billboardHeight - 55);
      
      ctx.fillStyle = CONFIG.colors.neonBlue; ctx.shadowColor = CONFIG.colors.neonBlue; ctx.shadowBlur = 10;
      ctx.font = "bold 26px 'Orbitron', sans-serif"; ctx.fillText(milestone.title, 0, -billboardHeight - 20);
      
      ctx.fillStyle = CONFIG.colors.neonRed; ctx.shadowColor = CONFIG.colors.neonRed;
      ctx.font = "600 14px 'Rajdhani', sans-serif"; ctx.fillText(milestone.subtitle, 0, -billboardHeight + 10);
      
      ctx.fillStyle = CONFIG.colors.white; ctx.shadowColor = 'transparent';
      ctx.font = "400 13px 'Rajdhani', sans-serif";
      
      const words = milestone.text.split(' ');
      let line = '', y = -billboardHeight + 40;
      words.forEach(word => {
        const testLine = line + word + ' ';
        if (ctx.measureText(testLine).width > billboardWidth - 40 && line !== '') {
          ctx.fillText(line.trim(), 0, y); line = word + ' '; y += 18;
        } else { line = testLine; }
      });
      ctx.fillText(line.trim(), 0, y);
      
      const scanY = ((state.time * 50) % billboardHeight) - billboardHeight - 100;
      ctx.globalAlpha = visibility * 0.3; ctx.fillStyle = CONFIG.colors.neonBlue;
      ctx.fillRect(-billboardWidth / 2 + 5, scanY, billboardWidth - 10, 2);
      ctx.restore();
    }

    function render() {
      state.time += 0.016;
      state.scrollCurrent = lerp(state.scrollCurrent, state.scrollTarget, CONFIG.physics.lerpSpeed);
      state.scrollVelocity = state.scrollTarget - state.scrollCurrent;
      state.scrollCurrent = clamp(state.scrollCurrent, 0, CONFIG.world.totalLength - width);
      state.scrollTarget = clamp(state.scrollTarget, 0, CONFIG.world.totalLength - width);
      
      const cameraX = state.scrollCurrent, speed = state.scrollVelocity;
      state.wheelRotation += speed * 0.05;
      
      ctx.fillStyle = CONFIG.colors.void; ctx.fillRect(0, 0, width, height);
      
      drawStars(cameraX);
      ctx.save(); drawMountains(cameraX); drawCitySilhouettes(cameraX); ctx.restore();
      
      drawRoad(cameraX); drawPedestrianWalkway(cameraX);
      
      const milestones = getMilestones();
      let nearestMilestone = null, nearestMilestoneScreenX = 0, minDistance = Infinity;
      
      milestones.forEach((milestone, index) => {
        const screenX = milestone.x - cameraX;
        drawMilestone(milestone, screenX, cameraX);
        const dist = Math.abs(screenX - width * 0.35);
        if (dist < minDistance) {
          minDistance = dist; nearestMilestone = milestone;
          nearestMilestoneScreenX = screenX; state.currentMilestone = index;
        }
      });
      
      particles.forEach((p, i) => { p.update(); if (p.life <= 0) particles.splice(i, 1); });
      
      const carScreenX = width * 0.35, carScreenY = height * CONFIG.world.groundY - 20;
      if (Math.abs(speed) > 1) emitExhaustParticles(carScreenX - CONFIG.car.width * 0.45, carScreenY + CONFIG.car.height * 0.2, speed);
      particles.forEach(p => p.draw(ctx));
      
      drawCar(carScreenX, carScreenY, state.wheelRotation, speed);
      drawDrone(carScreenX, carScreenY, nearestMilestone, nearestMilestoneScreenX);
      
      const progress = (cameraX / (CONFIG.world.totalLength - width)) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
      document.getElementById('milestoneIndicator').textContent = `MILE ${state.currentMilestone}`;
      if (cameraX > 100) document.getElementById('scrollHint').classList.add('hidden');
      
      requestAnimationFrame(render);
    }

    function handleWheel(e) { e.preventDefault(); state.scrollTarget += e.deltaY * CONFIG.physics.scrollMultiplier; }
    function handleTouchStart(e) { e.preventDefault(); state.touchStartY = e.touches[0].clientY; state.lastTouchY = state.touchStartY; state.isDragging = true; }
    function handleTouchMove(e) {
      e.preventDefault(); if (!state.isDragging) return;
      const touchY = e.touches[0].clientY, deltaY = state.lastTouchY - touchY;
      state.scrollTarget += deltaY * CONFIG.physics.scrollMultiplier * 2; state.lastTouchY = touchY;
    }
    function handleTouchEnd(e) { state.isDragging = false; }

    async function initializeApp() {
      const loaderBar = document.getElementById('loaderBar'), loadingText = document.getElementById('loadingText'), loadingScreen = document.getElementById('loadingScreen');
      const loadingSteps = [
        { text: 'INITIALIZING ENGINE', progress: 20 }, { text: 'GENERATING WORLD', progress: 40 },
        { text: 'LOADING ASSETS', progress: 60 }, { text: 'CALIBRATING SYSTEMS', progress: 80 }, { text: 'READY', progress: 100 }
      ];
      for (const step of loadingSteps) {
        loadingText.textContent = step.text; loaderBar.style.width = step.progress + '%';
        await new Promise(resolve => setTimeout(resolve, 400));
      }
      await new Promise(resolve => setTimeout(resolve, 500));
      loadingScreen.classList.add('hidden'); state.loaded = true;
    }

    async function init() {
      resizeCanvas(); window.addEventListener('resize', resizeCanvas);
      initStars(); initBuildings(); initMountains();
      
      canvas.addEventListener('wheel', handleWheel, { passive: false });
      canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
      canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
      canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
      document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
      
      await initializeApp();
      render();
    }

    init();
  </script>
</body>
</html>
